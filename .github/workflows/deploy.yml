name: Deploy Wealthfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Frontend build ────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ── SSH key setup ─────────────────────────────────────────
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # ── Deploy backend ────────────────────────────────────────
      - name: Deploy backend
        run: |
          tar czf /tmp/backend.tar.gz \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.db' \
            --exclude='*.db-journal' \
            --exclude='*.log' \
            --exclude='.venv' \
            -C backend .

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p ~/wealthfolio/backend"

          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            /tmp/backend.tar.gz \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/backend.tar.gz

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ~/wealthfolio/backend && tar xzf /tmp/backend.tar.gz && rm /tmp/backend.tar.gz"

      # ── Deploy frontend build ─────────────────────────────────
      - name: Deploy frontend
        run: |
          tar czf /tmp/frontend.tar.gz -C frontend/dist .

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p ~/wealthfolio/frontend/dist"

          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            /tmp/frontend.tar.gz \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/frontend.tar.gz

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ~/wealthfolio/frontend/dist && rm -rf ./* && tar xzf /tmp/frontend.tar.gz && rm /tmp/frontend.tar.gz"

      # ── Install deps & restart services on server ─────────────
      - name: Install dependencies & restart
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          set -e

          cd ~/wealthfolio/backend

          # Ensure python3-venv is installed
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-venv

          # Create venv if it doesn't exist
          if [ ! -d ".venv" ]; then
            python3 -m venv --without-pip .venv
            .venv/bin/python3 -m ensurepip --default-pip
          fi

          # Install / update Python dependencies
          .venv/bin/python3 -m pip install --quiet --upgrade pip
          .venv/bin/python3 -m pip install --quiet -r requirements.txt

          # Restart the backend service (systemd)
          sudo systemctl restart wealthfolio-backend

          echo "✅ Deploy complete"
          EOF

      # ── Cleanup ───────────────────────────────────────────────
      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
