name: Deploy Wealthfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Frontend build ────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ── SSH key setup ─────────────────────────────────────────
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # ── Deploy backend ────────────────────────────────────────
      - name: Deploy backend
        run: |
          rsync -avz --delete \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.db' \
            --exclude='*.db-journal' \
            --exclude='*.log' \
            --exclude='.venv' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            backend/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/wealthfolio/backend/

      # ── Deploy frontend build ─────────────────────────────────
      - name: Deploy frontend
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            frontend/dist/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/wealthfolio/frontend/dist/

      # ── Install deps & restart services on server ─────────────
      - name: Install dependencies & restart
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          set -e

          cd ~/wealthfolio/backend

          # Create venv if it doesn't exist
          if [ ! -d ".venv" ]; then
            python3 -m venv .venv
          fi

          # Install / update Python dependencies
          .venv/bin/pip install --quiet --upgrade pip
          .venv/bin/pip install --quiet -r requirements.txt

          # Restart the backend service (systemd)
          sudo systemctl restart wealthfolio-backend

          echo "✅ Deploy complete"
          EOF

      # ── Cleanup ───────────────────────────────────────────────
      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
